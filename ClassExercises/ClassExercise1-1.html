<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #E3F2FD;
      }
      .card {
        padding: 10px;
      }
      .card-title {
        font-weight: 600;
        font-size: 3em;
        padding: 0 0 10px 0;
      }
      .todoDone {
        text-decoration: line-through;
      }
      .card-description {
        font-weight: 400;
        font-size: 2em;
      }
    </style>
  </head>
  <body>
    <form onsubmit="addTodoToList(event)">
      <div>
        <label for="title">Title: </label>
        <input type="text" id="title" name="title" />
      </div>
      <div>
        <label for="desc">Description:</label>
        <input type="text" id="desc" name="desc" />
      </div>
      <button type="submit">Save</button>
    </form>
    <template id="card-template">
      <div class="card">
        <div class="card-body">
          <div class="card-title todoDone"></div>
          <div class="card-text"></div>
          <div>
            <label for="done">Done</label>
            <input type="checkbox" />
          </div>
        </div>
      </div>
    </template>
    <div id="todo-list"></div>
  </body>
  <script>
    const todos = [
      { title: " this is a title1", desc: "this is a desc1" },
      { title: " this is a title2", desc: "this is a desc2" },
    ];

    function addTodoToList(event) {
      event.preventDefault();
      const title = document.getElementById("title").value;
      const desc = document.getElementById("desc").value;
      todos.push({ title, desc });
      document.getElementById("todo-list").innerHTML = "";
      todos.forEach((todo) => {
        addTodo(todo.title, todo.desc);
      });
    }

    function addTodo(title, desc) {
      // clone the template
      const template = document
        .getElementById("card-template")
        .content.cloneNode(true);
      // populate the template
      template.querySelector(".card-title").innerText = title;
      template.querySelector(".card-text").innerText = desc;
      // include the populated template into the page
      document.querySelector("#todo-list").appendChild(template);
    }
    todos.forEach((todo) => {
      addTodo(todo.title, todo.desc);
    });
  </script>
</html>
