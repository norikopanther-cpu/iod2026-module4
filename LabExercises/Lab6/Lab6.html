<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fetch Posts</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h2 class="mb-4">Posts</h2>

  <!-- Input for limit -->
  <div class="mb-3">
    <input type="number" id="limit" class="form-control" value="10" min="1">
  </div>

  <!-- Button -->
  <button class="btn btn-primary mb-4" onclick="fetchPosts()">Load Posts</button>

  <!-- Posts container -->
  <div class="row" id="posts"></div>
</div>

<script src="Lab6.js"></script>
</body>
</html>
