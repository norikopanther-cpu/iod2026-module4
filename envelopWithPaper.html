<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pastel Envelopes</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .envelope {
      position: relative;
      width: 220px;
      height: 190px;
      cursor: pointer;
      perspective: 1200px;
      transition: transform 0.2s ease;
    }

    .envelope:hover {
      transform: translateY(-4px);
    }

    /* back rectangle */
    .body-back {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 160px;
      background: var(--env);
      z-index: 1;
    }

    /* white paper */
    .letter {
      position: absolute;
      left: 20px;
      bottom: 42px;
      width: calc(100% - 40px);
      height: 96px;
      background: white;
      border-radius: 8px 8px 0 0;
      z-index: 2;
      transition: transform 0.55s ease;
    }

    /* flap hinge wrapper */
    .flap-wrap {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 95px;
      transform-origin: 50% 0%;
      transform-style: preserve-3d;
      transition: transform 0.65s ease;
      z-index: 5;
    }

    .flap-front,
    .flap-back {
      position: absolute;
      inset: 0;
      clip-path: polygon(0 100%, 50% 0, 100% 100%);
      backface-visibility: hidden;
    }

    .flap-front {
      background: var(--env-flap-front);
      transform: rotateX(0deg);
    }

    .flap-back {
      background: var(--env-flap-back);
      transform: rotateX(180deg);
    }

    /* front pocket */
    .front-left,
    .front-right,
    .front-bottom {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 160px;
      z-index: 4;
    }

    .front-left {
      background: var(--env-left);
      clip-path: polygon(0 0, 50% 55%, 0 100%);
    }

    .front-right {
      background: var(--env-right);
      clip-path: polygon(100% 0, 50% 55%, 100% 100%);
    }

    .front-bottom {
      background: var(--env-bottom);
      clip-path: polygon(0 100%, 50% 55%, 100% 100%);
    }

    /* open state */
    .open .letter {
      transform: translateY(-70px);
    }

    .open .flap-wrap {
      transform: rotateX(180deg);
      z-index: 0;
    }

    /* colours */
    .yellow {
      --env: #f4e58a;
      --env-left: #e6d86f;
      --env-right: #e6d86f;
      --env-bottom: #efe07a;
      --env-flap-front: #fbf3b2;
      --env-flap-back: #eadf8f;
    }

    .blue {
      --env: #a9cde8;
      --env-left: #8fb9d8;
      --env-right: #8fb9d8;
      --env-bottom: #9fc5e2;
      --env-flap-front: #cfe4f5;
      --env-flap-back: #a8c9e2;
    }

    .pink {
      --env: #e9aebe;
      --env-left: #d895a7;
      --env-right: #d895a7;
      --env-bottom: #e2a3b4;
      --env-flap-front: #f4c8d4;
      --env-flap-back: #e2b2c0;
    }
  </style>
</head>
<body>

  <div class="envelope yellow" onclick="toggleEnvelope(this)">
    <div class="body-back"></div>
    <div class="letter"></div>

    <div class="flap-wrap">
      <div class="flap-front"></div>
      <div class="flap-back"></div>
    </div>

    <div class="front-left"></div>
    <div class="front-right"></div>
    <div class="front-bottom"></div>
  </div>

  <div class="envelope blue" onclick="toggleEnvelope(this)">
    <div class="body-back"></div>
    <div class="letter"></div>

    <div class="flap-wrap">
      <div class="flap-front"></div>
      <div class="flap-back"></div>
    </div>

    <div class="front-left"></div>
    <div class="front-right"></div>
    <div class="front-bottom"></div>
  </div>

  <div class="envelope pink" onclick="toggleEnvelope(this)">
    <div class="body-back"></div>
    <div class="letter"></div>

    <div class="flap-wrap">
      <div class="flap-front"></div>
      <div class="flap-back"></div>
    </div>

    <div class="front-left"></div>
    <div class="front-right"></div>
    <div class="front-bottom"></div>
  </div>

  <script>
    function toggleEnvelope(el) {
      el.classList.toggle("open");
    }
  </script>

</body>
</html>
